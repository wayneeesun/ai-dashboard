const paperDirectionColors = {
  'Agent': '#2563EB',
  '长上下文': '#7C3AED',
  '多模态': '#059669',
  '推理 / Scaling': '#DC2626',
  '推理 / 评估': '#DC2626',
  '推理 / 优化': '#DC2626',
  'AI for Science': '#D97706',
  '安全': '#DC2626',
  '训练方法': '#0891B2',
  '图像生成': '#DB2777',
  '语音生成': '#4F46E5'
};

const paperSignificanceIcons = {
  'hot': '🔥',
  'breakthrough': '💡',
  'notable': '📌',
  'emerging': '🌱'
};

const paperSignificanceOrder = {
  'hot': 0,
  'breakthrough': 1,
  'notable': 2,
  'emerging': 3
};

let papersData = null;

async function loadPapers() {
  if (papersData) return papersData;
  try {
    papersData = await fetchJSON('data/papers.json');
    return papersData;
  } catch(e) { return null; }
}

async function renderPapers() {
  const grid = document.getElementById('card-grid');
  grid.style.display = 'grid';
  grid.classList.remove('yt-grid');
  grid.classList.add('papers-grid');
  grid.innerHTML = '<div class="loading">加载中…</div>';

  const data = await loadPapers();
  if (!data || !data.papers.length) { grid.innerHTML = '<div class="loading">暂无数据</div>'; return; }

  document.getElementById('sector-subtitle').innerHTML =
    `${data.papers.length} 篇论文 · ${data.week_range} · 更新于 ${data.updated_at}`;

  let html = '';

  // ── Summary Banner ──
  if (data.direction_summary) {
    html += `<div class="paper-summary-banner">`;
    html += `<div class="paper-summary-headline">${data.direction_summary.headline}</div>`;
    if (data.direction_summary.emerging_directions && data.direction_summary.emerging_directions.length) {
      html += `<div class="paper-trends">`;
      html += `<div class="paper-trends-label">本月趋势 · 来源：<a href="https://huggingface.co/papers" target="_blank" rel="noopener" style="color:var(--accent)">Hugging Face Daily Papers</a> / arXiv</div>`;
      html += `<div class="paper-trend-list">`;
      data.direction_summary.emerging_directions.forEach(t => {
        html += `<span class="paper-trend-item">${t}</span>`;
      });
      html += `</div></div>`;
    }
    html += `</div>`;
  }

  // ── 按 direction 分组 ──
  const dirOrder = ['长上下文', 'Agent', 'AI for Science', '多模态', '推理 / Scaling', '推理 / 评估', '推理 / 优化', '训练方法', '图像生成', '语音生成', '安全', '前沿方法'];
  const groups = {};
  data.papers.forEach(p => {
    const dir = p.direction || '其他';
    if (!groups[dir]) groups[dir] = [];
    groups[dir].push(p);
  });

  // 每组内按 significance 排序
  const sigOrder = { hot: 0, breakthrough: 1, notable: 2, emerging: 3 };
  Object.values(groups).forEach(arr => arr.sort((a,b) => (sigOrder[a.significance]??9) - (sigOrder[b.significance]??9)));

  // 按预设顺序输出分组，没有的跳过，其余附在末尾
  const orderedDirs = [...dirOrder.filter(d => groups[d]), ...Object.keys(groups).filter(d => !dirOrder.includes(d))];

  orderedDirs.forEach(dir => {
    const papers = groups[dir];
    const dirColor = paperDirectionColors[dir] || '#94A3B8';
    html += `<div class="paper-section-header" style="--paper-direction-color:${dirColor}">
      <span class="paper-section-dot"></span>
      <span class="paper-section-name">${dir}</span>
      <span class="paper-section-count">${papers.length} 篇</span>
    </div>`;
    papers.forEach(p => { html += renderPaperCard(p); });
  });

  grid.innerHTML = html;
}

function renderPaperCard(p) {
  const dirColor = paperDirectionColors[p.direction] || '#94A3B8';
  const sigIcon = paperSignificanceIcons[p.significance] || '';

  const tagsHtml = (p.tags || []).map(t =>
    `<span class="paper-tag">${t}</span>`
  ).join('');

  const hfUpvotes = p.hf_upvotes ? `🤗 ${p.hf_upvotes}` : '';
  const ghStars = p.github_stars ? `⭐ ${formatNum(p.github_stars)}` : '';
  const metricsHtml = [];
  if (hfUpvotes) metricsHtml.push(`<span class="paper-metric">🤗 <span class="paper-metric-value">${formatNum(p.hf_upvotes)}</span></span>`);
  if (ghStars) metricsHtml.push(`<span class="paper-metric">⭐ <span class="paper-metric-value">${formatNum(p.github_stars)}</span></span>`);

  return `
    <div class="paper-card" style="--paper-direction-color:${dirColor}">
      <span class="paper-significance">${sigIcon}</span>
      <span class="paper-direction-tag">${p.direction}</span>
      <h3 class="paper-title">
        <a href="${p.url}" target="_blank" rel="noopener">${p.title}</a>
        <span class="paper-arxiv-id">arXiv:${p.id}</span>
        ${p.hf_url ? `<a href="${p.hf_url}" target="_blank" rel="noopener" title="HuggingFace Daily Papers" style="margin-left:6px;font-size:11px;color:#FF6B35;text-decoration:none;font-weight:600">🤗 HF</a>` : ''}
      </h3>
      <div class="paper-breakthrough">${p.breakthrough}</div>
      <div class="paper-tags">${tagsHtml}</div>
      <div class="paper-meta">
        <div>
          <div class="paper-authors">${p.authors}</div>
          <div class="paper-institution">${p.institution}</div>
        </div>
        <div style="text-align: right;">
          <div class="paper-metrics">${metricsHtml.join('')}</div>
          <div class="paper-date">${p.date}</div>
        </div>
      </div>
    </div>`;
}

// 统一的 Voice 卡片渲染：每个作者一张卡，显示最新一期
function renderVoiceCard(item, type) {
  const catColor = item.category_color || '#94A3B8';
  const focusTags = (item.focus || []).map(f =>
    `<span class="x-focus-tag" style="border-color:${catColor}33;color:${catColor}">${f}</span>`
  ).join('');

  // 获取最新一期内容
  let latestEp = null;
  let xSummaryBlock = '';
  if (type === 'youtube') {
    const vids = item.latest_videos || [];
    if (vids.length > 0) latestEp = { title: vids[0].title, url: vids[0].url, date: vids[0].date, summary: vids[0].summary || '' };
  } else if (type === 'x') {
    const lp = item.latest_posts || {};
    // 新格式：latest_posts 是 dict，含 summary / post_count / has_update / highlights
    if (lp && typeof lp === 'object' && !Array.isArray(lp) && lp.summary) {
      const statusDot = lp.has_update
        ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:6px"></span>'
        : '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#94a3b8;margin-right:6px"></span>';
      const statusText = lp.has_update ? `发了 ${lp.post_count} 帖子` : '没有更新';
      let highlightsHtml = '';
      if (lp.highlights && lp.highlights.length > 0) {
        highlightsHtml = lp.highlights.map(h =>
          `<div style="margin-top:6px;padding:6px 8px;background:var(--card-bg);border-left:3px solid var(--accent);border-radius:4px">
            <span style="font-size:10px;color:var(--accent);font-weight:600">${h.type || ''}</span>
            <div style="font-size:12px;font-weight:600;margin-top:2px">${h.title}</div>
            ${h.note ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4">${h.note}</div>` : ''}
          </div>`
        ).join('');
      }
      xSummaryBlock = `
        <div class="x-latest">
          <div class="x-latest-label" style="display:flex;align-items:center">
            ${statusDot}𝕏 近 3 天动态 · ${statusText}
          </div>
          <div style="font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px">${lp.summary}</div>
          ${highlightsHtml}
          <div class="x-post-meta" style="margin-top:6px">${lp.date || ''}</div>
        </div>`;
    } else if (Array.isArray(lp) && lp.length > 0) {
      // 兼容旧格式
      latestEp = { title: lp[0].text, url: item.url, date: lp[0].date, summary: '' };
    }
  } else if (type === 'podcast') {
    latestEp = item.latest_episode || null;
  }

  const typeIcon = type === 'youtube' ? '📺' : type === 'x' ? '𝕏' : '🎙️';
  const latestLabel = type === 'x' ? '𝕏 近期动态' : (type === 'youtube' ? '📺 最新视频' : '🎙️ 最新一期');
  const typeCTA = type === 'youtube' ? '▶ 前往频道' : type === 'x' ? '𝕏 前往主页' : '🎙️ 前往收听';
  const handle = item.handle || '';
  const subtitle = type === 'podcast'
    ? `<span style="color:var(--muted);font-size:11px">${item.platform || ''}</span>`
    : `<a href="${item.url}" target="_blank" rel="noopener" style="color:var(--accent)">${handle}</a>
       <span class="x-followers">${item.followers || item.subscribers || ''}</span>`;

  const summaryHtml = latestEp && latestEp.summary
    ? `<div class="x-post-summary" style="margin-top:4px;font-size:12px;color:var(--muted);line-height:1.5">${latestEp.summary}</div>` : '';

  const latestSection = xSummaryBlock || (latestEp ? `
    <div class="x-latest">
      <div class="x-latest-label">${latestLabel}</div>
      ${type === 'x' ? `<div class="x-post-item">${latestEp.title}</div>` :
        `<div class="x-post-item"><a href="${latestEp.url || '#'}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none">${latestEp.title}</a></div>`}
      <div class="x-post-meta">${latestEp.date || ''}</div>
      ${summaryHtml}
    </div>` : '');

  // 双频道渲染（适用于如硅谷101 & 硅谷101播客）
  const multiChannelSection = (type === 'youtube' && item.channels && item.channels.length > 0) ? `
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
      ${item.channels.map(ch => {
        const v = ch.latest_video || {};
        return `
          <div style="background:var(--card-bg);border-radius:8px;padding:10px 12px;border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
              <span style="font-size:11px;font-weight:700;color:${catColor}">${ch.name}</span>
              ${ch.subscribers ? `<span style="font-size:10px;color:var(--muted)">${ch.subscribers}</span>` : ''}
              <a href="${ch.url}" target="_blank" rel="noopener"
                style="margin-left:auto;font-size:10px;color:var(--accent);text-decoration:none">▶ 前往</a>
            </div>
            ${v.title ? `
              <div style="font-size:11px;font-weight:600;color:var(--text);line-height:1.4">
                <a href="${v.url || '#'}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none">${v.title}</a>
              </div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px">${v.date || ''}</div>
              ${v.summary ? `<div style="font-size:11px;color:var(--muted);line-height:1.45;margin-top:3px">${v.summary}</div>` : ''}
            ` : ''}
          </div>`;
      }).join('')}
    </div>` : '';

  return `
    <div class="x-card" style="--x-cat-color:${catColor}">
      <div class="x-card-top">
        <img class="x-avatar" src="${item.avatar_url}" alt="${item.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="x-avatar-fallback" style="display:none;background:${catColor}">${item.name[0]}</div>
        <div class="x-card-info">
          <h3 class="x-name">${item.name}</h3>
          <div class="x-handle">${subtitle}</div>
          <div class="x-focus-tags">${focusTags}</div>
        </div>
      </div>
      <p class="x-desc">${item.description}</p>
      ${multiChannelSection || latestSection}
      ${multiChannelSection ? '' : `<a class="x-profile-link" href="${item.url}" target="_blank" rel="noopener">${typeCTA}</a>`}
    </div>`;
}

async function renderLabFeed() {
  const grid = document.getElementById('card-grid');
  grid.style.display = 'flex';
  grid.style.flexDirection = 'column';
  grid.style.gap = '0';
  grid.classList.remove('yt-grid');
  grid.innerHTML = '<div class="loading">加载中…</div>';

  let data;
  try {
    data = await fetchJSON('data/lab-feed.json');
  } catch(e) {
    grid.innerHTML = '<div class="loading">加载失败</div>';
    return;
  }

  const catColors = { '模型': '#3B82F6', '研究': '#8B5CF6', '产品': '#10B981', '安全': '#EF4444', '公司': '#F59E0B', '收购': '#EC4899', '组织': '#6366F1' };

  let html = `
    <div style="padding:0 0 20px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px">
        追踪 Anthropic · OpenAI · Google DeepMind 官方 Blog 的模型发布、研究动态、组织变动
      </div>
      <div style="display:flex;flex-direction:column;gap:24px">
  `;

  for (const lab of data.labs) {
    html += `
      <div style="border:1px solid var(--border);border-radius:14px;overflow:hidden">
        <div style="padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--card-bg)">
          <div style="width:10px;height:10px;border-radius:50%;background:${lab.color};flex-shrink:0"></div>
          <span style="font-size:14px;font-weight:700;color:var(--text)">${lab.name}</span>
          <a href="${lab.url}" target="_blank" rel="noopener"
            style="margin-left:auto;font-size:11px;color:var(--accent);text-decoration:none">官方 Blog →</a>
        </div>
        <div>
    `;

    for (let i = 0; i < lab.posts.length; i++) {
      const p = lab.posts[i];
      const catColor = catColors[p.category] || '#94A3B8';
      const border = i < lab.posts.length - 1 ? 'border-bottom:1px solid var(--border)' : '';
      html += `
        <div style="padding:13px 18px;${border};display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start">
          <div>
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
              <span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;
                background:${catColor}22;color:${catColor}">${p.category}</span>
              <span style="font-size:11px;color:var(--muted)">${p.date}</span>
            </div>
            <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px">
              <a href="${p.url}" target="_blank" rel="noopener"
                style="color:var(--text);text-decoration:none"
                onmouseover="this.style.color='var(--accent)'"
                onmouseout="this.style.color='var(--text)'">${p.title}</a>
            </div>
            <div style="font-size:12px;color:var(--muted);line-height:1.5">${p.summary}</div>
          </div>
          <a href="${p.url}" target="_blank" rel="noopener"
            style="font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap;margin-top:2px">↗</a>
        </div>
      `;
    }

    html += `</div></div>`;
  }

  html += `</div></div>`;
  grid.innerHTML = html;
}

async function renderVoices() {
  const grid = document.getElementById('card-grid');
  grid.style.display = 'grid';
  grid.classList.add('yt-grid');
  grid.innerHTML = '<div class="loading">加载中…</div>';

  const [ytDataResult, xDataResult, podDataResult] = await Promise.all([
    loadYoutubers(), loadXAccounts(), loadPodcasts()
  ]);

  let totalCount = 0;
  let html = '';

  // ── Section 1: YouTube ──
  if (ytDataResult) {
    totalCount += ytDataResult.channels.length;
    html += `<div class="gh-category-header" style="grid-column:1/-1">
      <span class="gh-cat-icon">📺</span>
      <span class="gh-cat-name">YouTube</span>
      <span class="gh-cat-count">${ytDataResult.channels.length} 位博主</span>
    </div>`;
    ytDataResult.channels.forEach(ch => { html += renderVoiceCard(ch, 'youtube'); });
  }

  // ── Section 2: 播客 ──
  if (podDataResult) {
    totalCount += podDataResult.shows.length;
    html += `<div class="gh-category-header" style="grid-column:1/-1;margin-top:8px">
      <span class="gh-cat-icon">🎙️</span>
      <span class="gh-cat-name">播客</span>
      <span class="gh-cat-count">${podDataResult.shows.length} 个节目</span>
    </div>`;
    podDataResult.shows.forEach(p => { html += renderVoiceCard(p, 'podcast'); });
  }

  // ── Section 3: X / Twitter ──
  if (xDataResult) {
    totalCount += xDataResult.accounts.length;
    html += `<div class="gh-category-header" style="grid-column:1/-1;margin-top:8px">
      <span class="gh-cat-icon">𝕏</span>
      <span class="gh-cat-name">X / Twitter</span>
      <span class="gh-cat-count">${xDataResult.accounts.length} 位博主</span>
    </div>`;
    xDataResult.accounts.forEach(a => { html += renderVoiceCard(a, 'x'); });
  }

  document.getElementById('sector-subtitle').innerHTML =
    `YouTube · 播客 · X 共 ${totalCount} 个 · ${ytDataResult?.updated_at || ''}`;
  grid.innerHTML = html;
}

// Update timestamp
document.getElementById('last-updated').textContent = new Date().toLocaleDateString('zh-CN');

// ── Boot ──
init().catch(console.error);
</script>
