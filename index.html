<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Dashboard</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg-2: #181c27;
      --bg-3: #1e2335;
      --border: #2a2f45;
      --text: #e8eaf0;
      --text-muted: #8890a8;
      --text-dim: #555e7a;
      --accent: #4f8ef7;
      --accent-soft: rgba(79, 142, 247, 0.12);
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --sidebar-w: 220px;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.18s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 10;
      transition: width 0.22s cubic-bezier(0.4,0,0.2,1), min-width 0.22s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
    }

    #sidebar.collapsed {
      width: 52px;
      min-width: 52px;
    }

    .sidebar-header {
      padding: 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 56px;
      flex-shrink: 0;
    }

    .sidebar-header-text { overflow: hidden; transition: opacity 0.15s ease, width 0.22s ease; }
    #sidebar.collapsed .sidebar-header-text { opacity: 0; width: 0; pointer-events: none; }

    .sidebar-header h1 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
    }

    /* Toggle button */
    #sidebar-toggle {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all var(--transition);
      user-select: none;
    }
    #sidebar-toggle:hover { background: var(--border); color: var(--text); }

    .sidebar-section {
      padding: 16px 8px 8px;
      overflow: hidden;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 8px;
      margin-bottom: 6px;
      white-space: nowrap;
      transition: opacity 0.15s ease;
    }
    #sidebar.collapsed .sidebar-section-label { opacity: 0; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
    }

    .nav-item:hover {
      background: var(--bg-3);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .nav-item .icon { font-size: 16px; flex-shrink: 0; }

    .nav-item .nav-label {
      overflow: hidden;
      transition: opacity 0.15s ease, max-width 0.22s ease;
      max-width: 120px;
    }
    #sidebar.collapsed .nav-item .nav-label { opacity: 0; max-width: 0; }

    .nav-item .count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg-3);
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
      transition: opacity 0.15s ease;
    }
    #sidebar.collapsed .nav-item .count { opacity: 0; }
    .nav-item.active .count { background: var(--accent-soft); color: var(--accent); }

    /* ── Two-level nav ── */
    .nav-group {}

    .nav-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
    }

    .nav-group-header:hover {
      background: var(--bg-3);
      color: var(--text);
    }

    .nav-group-header .icon { font-size: 16px; flex-shrink: 0; }

    .nav-group-header .nav-label {
      overflow: hidden;
      transition: opacity 0.15s ease, max-width 0.22s ease;
      max-width: 120px;
      flex: 1;
    }
    #sidebar.collapsed .nav-group-header .nav-label { opacity: 0; max-width: 0; }

    .nav-group-header .chevron {
      font-size: 10px;
      color: var(--text-dim);
      transition: transform 0.2s ease, opacity 0.15s ease;
      flex-shrink: 0;
    }
    #sidebar.collapsed .nav-group-header .chevron { opacity: 0; }
    .nav-group.expanded .nav-group-header .chevron { transform: rotate(90deg); }

    .nav-group-children {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(0.4,0,0.2,1);
      padding-left: 12px;
    }
    .nav-group.expanded .nav-group-children {
      max-height: 500px;
    }
    #sidebar.collapsed .nav-group-children { max-height: 0 !important; }

    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 6px 8px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 0.15s ease;
    }
    #sidebar.collapsed .sidebar-footer { opacity: 0; }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top Bar ── */
    #topbar {
      padding: 18px 28px 0;
      flex-shrink: 0;
    }

    .topbar-inner {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    #sector-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    #sector-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Card Grid ── */
    #card-grid {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px 28px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .company-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }

    .company-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-color, var(--accent));
      opacity: 0.7;
    }

    .company-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      padding: 3px;
      flex-shrink: 0;
    }

    .card-logo-fallback {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--card-color, var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .card-title h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .card-title .ticker {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 2px;
    }

    .card-summary {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .card-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      background: var(--bg-3);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .metric-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .metric-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .metric-value.green { color: var(--green); }
    .metric-value.red { color: var(--red); }

    .card-footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
    }

    .earnings-badge {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .no-earnings-badge {
      color: var(--text-dim);
      font-size: 11px;
    }

    /* ── Detail Panel (Fullscreen) ── */
    #detail-overlay { display: none; }

    #detail-panel {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
      transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #detail-panel.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .detail-header {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .detail-header-logo {
      width: 44px; height: 44px;
      border-radius: 10px;
      object-fit: contain;
      background: #fff;
      padding: 4px;
    }

    .detail-header-logo-fallback {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }

    .detail-header-info h2 {
      font-size: 20px;
      font-weight: 700;
    }

    .detail-header-info .ticker-tag {
      display: inline-block;
      background: var(--bg-3);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 3px;
    }

    .detail-close {
      margin-left: auto;
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
      font-weight: 600;
    }

    .detail-close:hover { background: #3a2a2a; border-color: var(--red); color: var(--red); }

    .detail-body {
      padding: 28px 32px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 8px 16px;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all var(--transition);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Sections */
    .section { margin-bottom: 28px; }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .summary-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* Segments */
    .segments { display: flex; flex-direction: column; gap: 10px; }

    .segment {
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .segment-bar-wrap { flex-shrink: 0; width: 44px; text-align: center; }
    .segment-pct { font-size: 18px; font-weight: 800; color: var(--accent); }
    .segment-pct-label { font-size: 10px; color: var(--text-dim); }

    .segment-info h4 { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .segment-info p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    .segment-note {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Metrics Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .metric-card {
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      padding: 14px;
    }

    .metric-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
    .metric-card .value { font-size: 20px; font-weight: 800; color: var(--text); }
    .metric-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Key Debates */
    .debates { display: flex; flex-direction: column; gap: 8px; }

    .debate-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 14px;
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--yellow);
    }

    .debate-item p { font-size: 13px; color: var(--text-muted); line-height: 1.55; }

    /* Earnings */
    .earnings-list { display: flex; flex-direction: column; gap: 16px; }

    .earnings-card {
      background: var(--bg-3);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .earnings-card-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .earnings-quarter {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .earnings-date {
      font-size: 12px;
      color: var(--text-dim);
    }

    .beat-badge {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .beat-badge.beat { background: rgba(52,211,153,0.15); color: var(--green); }
    .beat-badge.miss { background: rgba(248,113,113,0.15); color: var(--red); }

    .earnings-card-body { padding: 16px 18px; }

    .earnings-nums {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .earnings-num .label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .earnings-num .value { font-size: 16px; font-weight: 700; color: var(--text); }
    .earnings-num .delta { font-size: 11px; color: var(--green); margin-top: 2px; }
    .earnings-num .delta.red { color: var(--red); }

    .earnings-highlights { margin-bottom: 14px; }
    .earnings-highlights h4 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

    .highlight-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .highlight-list li {
      padding: 8px 12px;
      background: var(--bg-2);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
      border-left: 2px solid var(--accent);
      line-height: 1.5;
    }

    .review-summary-box {
      background: rgba(79,142,247,0.07);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }

    .review-summary-box .review-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .review-summary-box p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .empty-earnings {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-dim);
    }

    .empty-earnings .icon { font-size: 36px; margin-bottom: 12px; }
    .empty-earnings p { font-size: 13px; }

    /* Analyst Notes */
    .thesis-box {
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 20px;
      border-left: 3px solid var(--accent);
    }

    .evolution-log { display: flex; flex-direction: column; gap: 10px; }

    .log-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .log-date {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      padding-top: 2px;
      min-width: 80px;
    }

    .log-note {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      padding: 8px 12px;
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      flex: 1;
    }

    /* Topic Page */
    .topic-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--text-dim);
      gap: 16px;
    }

    .topic-placeholder .big-icon { font-size: 56px; }
    .topic-placeholder h2 { font-size: 20px; color: var(--text-muted); }
    .topic-placeholder p { font-size: 13px; max-width: 360px; text-align: center; line-height: 1.6; }

    /* ── Infra Map ── */
    .infra-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      width: 100%;
      min-height: 560px;
    }
    @media (max-width: 1100px) {
      .infra-layout { grid-template-columns: 1fr; }
    }
    .infra-map-panel { display: flex; flex-direction: column; gap: 12px; position: relative; }
    .infra-region-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .infra-region-btn {
      padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg-2); color: var(--text-muted); font-size: 12px; cursor: pointer;
      transition: var(--transition);
    }
    .infra-region-btn:hover { border-color: var(--accent); color: var(--text); }
    .infra-region-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .infra-tooltip {
      position: absolute; z-index: 99;
      background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 13px; font-size: 12px; line-height: 1.6; color: var(--text);
      pointer-events: none; max-width: 240px; box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .infra-table-panel {
      display: flex; flex-direction: column; gap: 10px;
      background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border); padding: 16px;
    }
    .infra-table-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .infra-legend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); flex-wrap: wrap; }
    .infra-legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .infra-table-wrap { overflow: auto; max-height: 440px; }
    .infra-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .infra-table th {
      text-align: left; padding: 7px 8px; font-weight: 500; color: var(--text-muted);
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      background: var(--bg-2); white-space: nowrap;
    }
    .infra-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .infra-row { cursor: pointer; transition: background .12s; }
    .infra-row:hover { background: var(--bg-3); }
    .infra-row.highlighted { background: rgba(79,142,247,.08); }
    .infra-status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
    }

    /* ── GitHub Trending Cards ── */
    .gh-trend-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }

    .gh-trend-header .period-badge {
      font-size: 11px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 10px;
      font-weight: 500;
    }

    .gh-trend-header .updated {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .gh-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }

    .gh-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gh-lang-color, var(--accent));
      opacity: 0.7;
    }

    .gh-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .gh-card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .gh-avatar {
      width: 36px; height: 36px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-3);
    }

    .gh-card-title {
      flex: 1;
      min-width: 0;
    }

    .gh-card-title h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      word-break: break-all;
    }

    .gh-card-title .gh-owner {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .gh-lang-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-3);
      padding: 2px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .gh-lang-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gh-lang-color, var(--accent));
    }

    .gh-explanation {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
      min-height: 58px;
    }

    .gh-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .gh-stat {
      background: var(--bg-3);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }

    .gh-stat .label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 3px;
    }

    .gh-stat .value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .gh-stat .value.hot {
      color: var(--yellow);
    }

    .gh-card-footer {
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .gh-card-footer .author-label {
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 2px;
    }

    /* GitHub detail overlay */
    .gh-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .gh-detail-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .gh-detail-box {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
      transform: translateY(16px);
      transition: transform 0.2s ease;
    }

    .gh-detail-overlay.visible .gh-detail-box {
      transform: translateY(0);
    }

    .gh-detail-close {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .gh-detail-close:hover { background: #3a2a2a; border-color: var(--red); color: var(--red); }

    .gh-detail-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .gh-detail-box .gh-detail-owner { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .gh-detail-box .gh-detail-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.5; font-style: italic; }
    .gh-detail-box .gh-detail-explain { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; }
    .gh-detail-box .gh-detail-author { font-size: 13px; color: var(--text-muted); line-height: 1.6; padding: 12px 14px; background: var(--bg-3); border-radius: var(--radius-sm); margin-bottom: 20px; border-left: 2px solid var(--accent); }
    .gh-detail-box .gh-detail-author .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; font-weight: 600; }
    .gh-detail-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--accent-soft); color: var(--accent); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; text-decoration: none; transition: all var(--transition); }
    .gh-detail-link:hover { background: var(--accent); color: #fff; }

    /* Category headers in grid */
    .gh-category-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px 4px;
      margin-top: 8px;
    }

    .gh-category-header:first-child { margin-top: 0; }

    .gh-cat-icon { font-size: 18px; }

    .gh-cat-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .gh-cat-desc {
      font-size: 12px;
      color: var(--text-dim);
      flex: 1;
    }

    .gh-cat-count {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg-3);
      padding: 1px 8px;
      border-radius: 10px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<nav id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-header-text">
      <h1>AI Dashboard</h1>
    </div>
    <div id="sidebar-toggle" onclick="toggleSidebar()" title="收缩侧边栏">◀</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Coverage</div>
    <div id="nav-list"><!-- injected by JS --></div>
  </div>
  <div class="sidebar-footer">
    Updated: <span id="last-updated">—</span>
  </div>
</nav>

<!-- ── Main ── -->
<main id="main">
  <div id="topbar">
    <div class="topbar-inner">
      <h2 id="sector-title">选择一个板块</h2>
      <span id="sector-subtitle"></span>
    </div>
  </div>
  <div id="card-grid">
    <div class="loading">← 从左侧选择板块开始</div>
  </div>
</main>

<!-- ── GitHub Detail Overlay ── -->
<div class="gh-detail-overlay" id="gh-detail-overlay" onclick="closeGhDetail(event)">
  <div class="gh-detail-box" id="gh-detail-box">
    <button class="gh-detail-close" onclick="closeGhDetail()">✕</button>
    <div id="gh-detail-content"></div>
  </div>
</div>

<!-- ── Detail Overlay + Panel ── -->
<div id="detail-overlay"></div>
<aside id="detail-panel">
  <div class="detail-header" id="detail-header"><!-- injected --></div>
  <div class="detail-body" id="detail-body"><!-- injected --></div>
</aside>

<script>
// ── State ──
const state = { nav: [], sectors: [], companies: {}, activeSector: null };

// ── Fetch helpers ──
async function fetchJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`Failed: ${path}`);
  return r.json();
}

// ── 实时市值（Yahoo Finance，浏览器直接请求） ──
const TICKER_MAP = {
  meta: 'META', google: 'GOOGL', amazon: 'AMZN', applovin: 'APP',
  pinterest: 'PINS', reddit: 'RDDT', pdd: 'PDD', baidu: 'BIDU', jd: 'JD',
  nvidia: 'NVDA', tsmc: 'TSM', broadcom: 'AVGO', amd: 'AMD',
  sandisk: 'SNDK', micron: 'MU', microsoft: 'MSFT', shopify: 'SHOP',
  oracle: 'ORCL', servicenow: 'NOW', snowflake: 'SNOW', cloudflare: 'NET',
  tencent: '0700.HK', alibaba: '9988.HK', meituan: '3690.HK',
};
const liveMarketCaps = {}; // id → { fmt, usd_bn }
let marketCapFetchDone = false;

async function fetchLiveMarketCaps() {
  if (marketCapFetchDone) return;
  const usTickers = Object.entries(TICKER_MAP).filter(([,t]) => !t.endsWith('.HK')).map(([,t]) => t);
  const hkTickers = Object.entries(TICKER_MAP).filter(([,t]) => t.endsWith('.HK')).map(([,t]) => t);
  const allTickers = [...usTickers, ...hkTickers].join(',');
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/quote?symbols=${allTickers}&fields=marketCap,shortName,regularMarketPrice,currency`;
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!r.ok) throw new Error('Yahoo Finance API error');
    const data = await r.json();
    const results = data?.quoteResponse?.result || [];
    // 建立 ticker → company_id 的反向映射
    const reverseMap = {};
    Object.entries(TICKER_MAP).forEach(([id, t]) => { reverseMap[t] = id; });
    results.forEach(item => {
      const id = reverseMap[item.symbol];
      if (!id || !item.marketCap) return;
      const bn = item.marketCap / 1e9;
      let fmt;
      if (bn >= 1000) fmt = `$${(bn/1000).toFixed(1)}T`;
      else fmt = `$${Math.round(bn)}B`;
      // HK 市值转 USD（HKD/USD ≈ 0.128）
      const isHK = item.currency === 'HKD';
      const usd_bn = isHK ? bn * 0.128 : bn;
      let usd_fmt;
      if (usd_bn >= 1000) usd_fmt = `$${(usd_bn/1000).toFixed(1)}T`;
      else usd_fmt = `$${Math.round(usd_bn)}B`;
      liveMarketCaps[id] = { fmt: isHK ? usd_fmt : fmt, usd_bn, raw_fmt: fmt, currency: item.currency };
    });
    marketCapFetchDone = true;
  } catch(e) {
    console.warn('Live market cap fetch failed:', e.message);
  }
}

async function loadCompany(id) {
  if (state.companies[id]) return state.companies[id];
  try {
    const data = await fetchJSON(`data/companies/${id}.json`);
    state.companies[id] = data;
    return data;
  } catch { return null; }
}

// ── Init ──
async function init() {
  const data = await fetchJSON('data/sectors.json');
  state.nav = data.nav;
  // Flatten all sectors (children of groups + top-level non-groups) for lookup
  state.sectors = [];
  data.nav.forEach(item => {
    if (item.type === 'group' && item.children) {
      item.children.forEach(child => state.sectors.push(child));
    } else {
      state.sectors.push(item);
    }
  });
  renderSidebar();
  // Auto-select first leaf sector
  const firstLeaf = state.sectors.find(s => s.type === 'companies' && s.companies && s.companies.length > 0);
  if (firstLeaf) selectSector(firstLeaf.id);
}

// ── Sidebar ──
function renderSidebar() {
  const list = document.getElementById('nav-list');
  list.innerHTML = state.nav.map(item => {
    if (item.type === 'group') {
      return renderNavGroup(item);
    } else {
      return renderNavItem(item);
    }
  }).join('');
}

function renderNavGroup(group) {
  const childrenHtml = group.children.map(child => renderNavItem(child)).join('');
  return `
    <div class="nav-group expanded" data-group="${group.id}">
      <div class="nav-group-header" onclick="toggleGroup('${group.id}')">
        <span class="icon">${group.icon}</span>
        <span class="nav-label">${group.name}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="nav-group-children">
        ${childrenHtml}
      </div>
    </div>`;
}

function renderNavItem(s) {
  const count = s.companies ? s.companies.length : '→';
  return `
    <div class="nav-item" data-id="${s.id}" onclick="selectSector('${s.id}')">
      <span class="icon">${s.icon}</span>
      <span class="nav-label">${s.name}</span>
      <span class="count">${count}</span>
    </div>`;
}

function toggleGroup(groupId) {
  const el = document.querySelector(`.nav-group[data-group="${groupId}"]`);
  if (el) el.classList.toggle('expanded');
}

// ── Select Sector ──
async function selectSector(id) {
  state.activeSector = id;

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const sector = state.sectors.find(s => s.id === id);
  if (!sector) return;

  document.getElementById('sector-title').textContent = `${sector.icon} ${sector.name}`;

  const grid = document.getElementById('card-grid');

  if (sector.topic === 'github-trend') {
    await renderGithubTrending();
    return;
  }

  if (sector.topic === 'infra-map') {
    await renderInfraMap();
    return;
  }

  if (sector.type === 'topic') {
    document.getElementById('sector-subtitle').textContent = '';
    grid.style.display = 'flex';
    grid.style.flexDirection = 'column';
    grid.innerHTML = renderTopicPage(sector);
    return;
  }

  // Reset grid styles
  grid.style.display = '';
  grid.style.flexDirection = '';
  grid.innerHTML = '<div class="loading">加载中…</div>';
  document.getElementById('sector-subtitle').textContent = `${sector.companies.length} 家公司`;

  // 先拉实时市值
  await fetchLiveMarketCaps();

  const companies = await Promise.all(sector.companies.map(loadCompany));
  const valid = companies.filter(Boolean);

  // 按市值降序排列（优先用实时市值，AI-native 用估值）
  valid.sort((a, b) => {
    const ma = liveMarketCaps[a.id]?.usd_bn ?? a.profile?.key_metrics?.market_cap_usd_bn ?? a.profile?.last_valuation_bn ?? 0;
    const mb = liveMarketCaps[b.id]?.usd_bn ?? b.profile?.key_metrics?.market_cap_usd_bn ?? b.profile?.last_valuation_bn ?? 0;
    return Number(mb) - Number(ma);
  });

  // 区分普通公司和 AI-native 私司
  if (sector.type === 'ai-native') {
    grid.innerHTML = valid.map(renderAiNativeCard).join('');
  } else {
    grid.innerHTML = valid.map(renderCard).join('');
  }
}

// ── AI-Native Card (私司：估值 + 融资轮次 + 新闻) ──
function renderAiNativeCard(c) {
  const p = c.profile || {};
  const logoHtml = c.logo_url
    ? `<img class="card-logo" src="${c.logo_url}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="card-logo-fallback" style="display:none;background:${c.color || '#4f8ef7'}">${(c.name||'?')[0]}</div>`
    : `<div class="card-logo-fallback" style="background:${c.color || '#4f8ef7'}">${(c.name||'?')[0]}</div>`;

  const valBn = Number(p.last_valuation_bn);
  const valuation = p.last_valuation_bn ? `$${valBn >= 1000 ? (valBn/1000).toFixed(1)+'T' : valBn+'B'}` : '—';
  const newsItems = (p.news || []).slice(0, 2).map(n => `<li>${n}</li>`).join('');
  const src = p.valuation_source ? `<small style="color:var(--text-dim);font-size:10px">来源：${p.valuation_source}</small>` : '';

  return `
    <div class="company-card ai-native-card" style="--card-color:${c.color || '#4f8ef7'}" onclick="openDetail('${c.id}')">
      <div class="card-header">
        <div style="position:relative">${logoHtml}</div>
        <div class="card-title">
          <h3>${c.name}</h3>
          <div class="ticker">Private · ${p.last_round || '—'}</div>
        </div>
      </div>
      <p class="card-summary">${p.summary || ''}</p>
      <div class="card-metrics">
        <div class="metric">
          <div class="metric-label">最新估值</div>
          <div class="metric-value">${valuation}</div>
          ${src}
        </div>
        <div class="metric" style="grid-column: span 3">
          <div class="metric-label">近期动态</div>
          <ul style="margin:4px 0 0 16px;font-size:12px;color:var(--text-muted);line-height:1.6">${newsItems || '<li>暂无</li>'}</ul>
        </div>
      </div>
      <div class="card-footer">
        <span class="no-earnings-badge">Private</span>
      </div>
    </div>`;
}

// ── Card ──
function renderCard(c) {
  const latestEarnings = c.earnings && c.earnings.length ? c.earnings[0] : null;
  const m = c.profile.key_metrics;

  const logoHtml = c.logo_url
    ? `<img class="card-logo" src="${c.logo_url}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="card-logo-fallback" style="display:none;background:${c.color || '#4f8ef7'}">${c.ticker[0]}</div>`
    : `<div class="card-logo-fallback" style="background:${c.color || '#4f8ef7'}">${c.ticker[0]}</div>`;

  const earningsBadge = latestEarnings
    ? `<span class="earnings-badge">${latestEarnings.quarter}</span>`
    : `<span class="no-earnings-badge">暂无 Earnings</span>`;

  return `
    <div class="company-card" style="--card-color:${c.color || '#4f8ef7'}" onclick="openDetail('${c.id}')">
      <div class="card-header">
        <div style="position:relative">
          ${logoHtml}
        </div>
        <div class="card-title">
          <h3>${c.name}</h3>
          <div class="ticker">${c.ticker} · ${c.exchange}</div>
        </div>
      </div>
      <p class="card-summary">${c.profile.summary}</p>
      <div class="card-metrics">
        <div class="metric">
          <div class="metric-label">市值</div>
          <div class="metric-value">${liveMarketCaps[c.id]?.fmt || m.market_cap || '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">营收增速</div>
          <div class="metric-value green">${m.ltm_revenue_growth || '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">营业利润率</div>
          <div class="metric-value">${m.ltm_operating_margin || '—'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">CapEx YoY</div>
          <div class="metric-value ${m.capex_growth_yoy ? 'red' : ''}">${m.capex_growth_yoy || '—'}</div>
        </div>
      </div>
      <div class="card-footer">
        <span style="font-size:10px;color:var(--text-dim)">${liveMarketCaps[c.id] ? '实时市值 via Yahoo Finance' : (m.updated_at ? '市值 '+m.updated_at : '—')}</span>
        ${earningsBadge}
      </div>
    </div>`;
}

// ── Topic Page ──
// ── Infra Map ──
let infraData = null;

async function loadInfraData() {
  if (infraData) return infraData;
  try {
    infraData = await fetchJSON('data/topics/infra-map.json');
    return infraData;
  } catch { return null; }
}

const STATUS_LABELS = {
  under_construction: { label: '建设中', color: '#fbbf24' },
  operational:        { label: '已投运', color: '#34d399' },
  planned:            { label: '规划中', color: '#818cf8' },
  announced:          { label: '已公布', color: '#60a5fa' },
};

const REGION_CENTERS = {
  us:  { lat: 39,   lng: -98,  scale: 600 },
  cn:  { lat: 35,   lng: 105,  scale: 700 },
  sea: { lat: 5,    lng: 115,  scale: 700 },
  eu:  { lat: 50,   lng: 10,   scale: 600 },
  me:  { lat: 25,   lng: 45,   scale: 700 },
};

async function renderInfraMap() {
  const grid = document.getElementById('card-grid');
  grid.style.display = 'flex';
  grid.style.flexDirection = 'column';
  grid.innerHTML = '<div class="loading">加载地图数据…</div>';

  const data = await loadInfraData();
  if (!data) { grid.innerHTML = '<div class="loading">数据加载失败</div>'; return; }

  document.getElementById('sector-subtitle').textContent = `${data.datacenters.length} 个数据中心 · 更新于 ${data.updated_at}`;

  grid.innerHTML = `
    <div class="infra-layout">
      <!-- 左：地图 -->
      <div class="infra-map-panel">
        <div class="infra-region-tabs">
          ${(data.regions||['us','cn','sea','eu','me']).map((r,i) =>
            `<button class="infra-region-btn${i===0?' active':''}" onclick="switchRegion('${r}')" data-region="${r}">

let currentRegion = 'us';
let d3Loaded = false;

async function loadD3AndDraw(data, region) {
  if (!d3Loaded) {
    await Promise.all([
      loadScript('https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'),
      loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js'),
    ]);
    d3Loaded = true;
  }
  drawGlobe(data, region);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function switchRegion(region) {
  currentRegion = region;
  document.querySelectorAll('.infra-region-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.region === region);

  if (data) drawGlobe(data, region);
}

function highlightDC(id) {

  });

let globeWorld = null;   // 缓存地图数据
let globeRotation = [0, -20]; // [lambda, phi] 当前旋转状态
let globeProjection = null;

async function drawGlobe(data, region) {
  const svg = document.getElementById('infra-globe');
  if (!svg || typeof d3 === 'undefined') return;

  const container = svg.parentElement;
  const W = Math.min(container.clientWidth || 600, 700);
  const H = 500;
  const CX = W / 2, CY = H / 2;
  const RADIUS = Math.min(W, H) / 2 - 20;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  d3.select(svg).selectAll('*').remove();

  // 加载地图数据（缓存）
  if (!globeWorld) {
    try {
      const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
      globeWorld = await res.json();
    } catch(e) {
      d3.select(svg).append('text').attr('x', CX).attr('y', CY)
        .attr('text-anchor','middle').attr('fill','#666').text('地图数据加载失败');
      return;
    }
  }

  // 旋转到目标区域
  const center = REGION_CENTERS[region] || REGION_CENTERS['us'];
  globeRotation = [-center.lng, -center.lat];

  const projection = d3.geoOrthographic()
    .scale(RADIUS)
    .translate([CX, CY])
    .rotate(globeRotation)
    .clipAngle(90);
  globeProjection = projection;

  const path = d3.geoPath().projection(projection);
  const s = d3.select(svg);

  // 海洋背景
  s.append('circle').attr('cx', CX).attr('cy', CY).attr('r', RADIUS)
    .attr('fill', '#0d1526').attr('stroke', '#2a2f45').attr('stroke-width', 1);

  // 国家层
  const countries = topojson.feature(globeWorld, globeWorld.objects.countries);
  const borders = topojson.mesh(globeWorld, globeWorld.objects.countries, (a,b) => a !== b);

  const countryG = s.append('g').attr('class', 'countries');
  countryG.selectAll('path')
    .data(countries.features)
    .join('path')
    .attr('d', path)
    .attr('fill', '#1e2740')
    .attr('stroke', '#2a3555')
    .attr('stroke-width', 0.4);

  const borderPath = s.append('path').datum(borders)
    .attr('d', path).attr('fill', 'none')
    .attr('stroke', '#3a4565').attr('stroke-width', 0.6);

  // 经纬网格
  const graticule = d3.geoGraticule()();
  s.append('path').datum(graticule)
    .attr('d', path).attr('fill', 'none')
    .attr('stroke', '#1e2535').attr('stroke-width', 0.4);

  // 数据中心点
  const tooltip = document.getElementById('infra-map-tooltip');
  const dcG = s.append('g').attr('class', 'dc-points');

  function renderDots() {
    dcG.selectAll('circle.dc-dot').remove();
    dcG.selectAll('text.dc-label').remove();

    dcG.selectAll('circle.dc-dot')
      .data(data.datacenters)
      .join('circle')
      .attr('class', 'dc-dot')
      .attr('cx', d => { const p = projection([d.lng, d.lat]); return p ? p[0] : -9999; })
      .attr('cy', d => { const p = projection([d.lng, d.lat]); return p ? p[1] : -9999; })
      .attr('r', d => Math.max(7, Math.sqrt((d.capacity_gw||0.1) * 300)))
      .attr('fill', d => (STATUS_LABELS[d.status]||{color:'#60a5fa'}).color)
      .attr('fill-opacity', d => {
        // 背面的点不显示
        const p = projection([d.lng, d.lat]);
        return p ? 0.8 : 0;
      })
      .attr('stroke', '#fff').attr('stroke-width', 1.5)
      .style('cursor', 'pointer')
      .on('mouseover', function(event, d) {
        const p = projection([d.lng, d.lat]);
        if (!p) return;
        const st = STATUS_LABELS[d.status] || {label: d.status};
        tooltip.style.display = 'block';
        tooltip.innerHTML = `
          <strong>${d.name}</strong><br>
          ${[d.city, d.state, d.country].filter(Boolean).join(', ')}<br>
          容量：<strong>${d.capacity_gw ? d.capacity_gw+'GW' : '—'}</strong><br>
          状态：${st.label}　开始：${d.start_date||'—'}<br>
          ${d.owner && d.owner !== 'Unknown' ? '运营：'+d.owner+'<br>' : ''}
          ${d.notes ? '<small style="color:var(--text-muted)">'+d.notes+'</small>' : ''}
        `;
        tooltip.style.left = (p[0] + 14) + 'px';
        tooltip.style.top  = (p[1] - 10) + 'px';
        d3.select(this).attr('stroke', '#fbbf24').attr('stroke-width', 2.5).attr('r', d => Math.max(9, Math.sqrt((d.capacity_gw||0.1)*300)+2));
        highlightDC(d.id);
      })
      .on('mouseout', function(event, d) {
        tooltip.style.display = 'none';
        d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5).attr('r', d => Math.max(7, Math.sqrt((d.capacity_gw||0.1)*300)));
      });

    // 标签
    dcG.selectAll('text.dc-label')
      .data(data.datacenters.filter(d => (d.capacity_gw||0) >= 0.3))
      .join('text')
      .attr('class', 'dc-label')
      .attr('x', d => { const p = projection([d.lng, d.lat]); return p ? p[0] + Math.max(9, Math.sqrt((d.capacity_gw||0.1)*300)) + 3 : -9999; })
      .attr('y', d => { const p = projection([d.lng, d.lat]); return p ? p[1] + 4 : -9999; })
      .attr('fill', '#e8eaf0').attr('font-size', '11px').attr('pointer-events', 'none')
      .text(d => d.name.length > 20 ? d.name.slice(0,18)+'…' : d.name);
  }

  renderDots();

  // ── 拖拽旋转 ──
  let dragStart = null;
  let rotationStart = globeRotation.slice();

  s.call(d3.drag()
    .on('start', (event) => {
      dragStart = [event.x, event.y];
      rotationStart = projection.rotate().slice();
      tooltip.style.display = 'none';
    })
    .on('drag', (event) => {
      if (!dragStart) return;
      const dx = event.x - dragStart[0];
      const dy = event.y - dragStart[1];
      const sensitivity = 0.3;
      const newRot = [
        rotationStart[0] + dx * sensitivity,
        Math.max(-85, Math.min(85, rotationStart[1] - dy * sensitivity)),
      ];
      projection.rotate(newRot);
      globeRotation = newRot;
      // 重绘
      countryG.selectAll('path').attr('d', path);
      borderPath.attr('d', path);
      s.select('path[datum]').attr('d', path);
      renderDots();
    })
  );

  // 滚轮缩放
  s.call(d3.zoom()
    .scaleExtent([0.5, 4])
    .on('zoom', (event) => {
      const newScale = RADIUS * event.transform.k;
      projection.scale(newScale);
      countryG.selectAll('path').attr('d', path);
      borderPath.attr('d', path);
      s.select('circle').attr('r', newScale);
      renderDots();
    })
  );

  // 提示文字
  s.append('text').attr('x', CX).attr('y', H - 8)
    .attr('text-anchor', 'middle').attr('fill', '#555e7a').attr('font-size', '11px')
    .text('拖拽旋转 · 滚轮缩放');
}

  Rust: '#dea584', Java: '#b07219', Shell: '#89e051', Go: '#00ADD8',
  'C++': '#f34b7d', C: '#555555', Ruby: '#701516', Swift: '#F05138',
  Kotlin: '#A97BFF', Dart: '#00B4AB', Zig: '#ec915c',
};

let ghTrendingData = null;

async function loadGithubTrending() {
  if (ghTrendingData) return ghTrendingData;
  try {
    ghTrendingData = await fetchJSON('data/github-trending.json');
    return ghTrendingData;
  } catch { return null; }
}

async function renderGithubTrending() {
  const grid = document.getElementById('card-grid');
  grid.style.display = '';
  grid.style.flexDirection = '';
  grid.innerHTML = '<div class="loading">加载中…</div>';

  const data = await loadGithubTrending();
  if (!data || !data.projects.length) {
    grid.innerHTML = '<div class="loading">暂无数据</div>';
    return;
  }

  document.getElementById('sector-subtitle').innerHTML = `${data.projects.length} 个项目 · ${data.period === 'weekly' ? '本周' : data.period} · 更新于 ${data.updated_at} · <a href="${data.source || 'https://github.com/trending?since=weekly'}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">Source: ${data.source_label || 'GitHub Trending'} ↗</a>`;

  // Group by category
  const catMap = {};
  (data.categories || []).forEach(c => { catMap[c.id] = c; });
  const groups = {};
  const catOrder = (data.categories || []).map(c => c.id);
  data.projects.forEach((p, i) => {
    const cid = p.category || 'other';
    if (!groups[cid]) groups[cid] = [];
    groups[cid].push({ ...p, _index: i });
  });

  let html = '';
  catOrder.forEach(cid => {
    const items = groups[cid];
    if (!items || !items.length) return;
    const cat = catMap[cid] || { icon: '📦', name: cid, description: '' };
    html += `<div class="gh-category-header" style="grid-column:1/-1;">
      <span class="gh-cat-icon">${cat.icon}</span>
      <span class="gh-cat-name">${cat.name}</span>
      <span class="gh-cat-desc">${cat.description}</span>
      <span class="gh-cat-count">${items.length}</span>
    </div>`;
    items.forEach(p => {
      html += renderGhCard(p, p._index);
    });
  });
  // other 已在 catOrder 中处理，不重复渲染
  grid.innerHTML = html;
}

function renderGhCard(p, idx) {
  const lang = p.language || '';
  const lc = langColors[lang] || '#8890a8';
  const avatarUrl = `https://github.com/${p.owner}.png?size=72`;
  // 字段兼容（旧数据用 total_stars/weekly_stars，新数据用 stars/stars_this_week）
  const totalStars = p.total_stars ?? p.stars ?? 0;
  const weeklyStars = p.weekly_stars ?? p.stars_this_week ?? 0;
  const forks = p.forks ?? 0;
  const explanation = p.explanation || p.description_zh || p.description || '暂无描述';
  const authorBio = p.author_bio || `<a href="https://github.com/${p.owner}" target="_blank" style="color:var(--accent)">@${p.owner}</a>`;

  return `
    <div class="gh-card" style="--gh-lang-color:${lc}" onclick="openGhDetail(${idx})">
      <div class="gh-card-top">
        <img class="gh-avatar" src="${avatarUrl}" alt="${p.owner}" onerror="this.style.background='var(--bg-3)';this.src=''" />
        <div class="gh-card-title">
          <h3>${p.name || p.repo || ''}</h3>
          <div class="gh-owner">${p.owner}</div>
        </div>
        <span class="gh-lang-badge">
          <span class="gh-lang-dot" style="background:${lc}"></span>
          ${lang || '—'}
        </span>
      </div>
      <p class="gh-explanation">${explanation}</p>
      <div class="gh-stats">
        <div class="gh-stat">
          <div class="label">总 Star</div>
          <div class="value">${formatNum(totalStars)}</div>
        </div>
        <div class="gh-stat">
          <div class="label">近期新增</div>
          <div class="value hot">${weeklyStars ? '+'+formatNum(weeklyStars) : '—'}</div>
        </div>
        <div class="gh-stat">
          <div class="label">Forks</div>
          <div class="value">${forks ? formatNum(forks) : '—'}</div>
        </div>
      </div>
      <div class="gh-card-footer">
        <div class="author-label">👤 作者</div>
        ${authorBio}
      </div>
    </div>`;
}

function formatNum(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

        <div class="earnings-nums">
          <div class="earnings-num">
            <div class="label">营收</div>
            <div class="value">$${(e.revenue/1000).toFixed(1)}B</div>
            <div class="delta">${e.revenue_growth_yoy} YoY</div>
          </div>
          <div class="earnings-num">
            <div class="label">营业利润率</div>
            <div class="value">${e.operating_margin || '—'}</div>
          </div>
          <div class="earnings-num">
            <div class="label">EPS</div>
            <div class="value">$${e.eps_diluted}</div>
            ${e.eps_vs_consensus ? `<div class="delta">${e.eps_vs_consensus} vs. Est</div>` : ''}
          </div>
          <div class="earnings-num">
            <div class="label">CapEx</div>
            <div class="value">$${(e.capex/1000).toFixed(1)}B</div>
          </div>
        </div>
        ${e.highlights && e.highlights.length ? `
          <div class="earnings-highlights">
            <h4>关键要点</h4>
            <ul class="highlight-list">
              ${e.highlights.map(h => `<li>${h}</li>`).join('')}
            </ul>
          </div>` : ''}
        ${e.review_summary ? `
          <div class="review-summary-box">
            <div class="review-label">📊 Review 摘要</div>
            <p>${e.review_summary}</p>
          </div>` : ''}
      </div>
    </div>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  document.body.style.overflow = '';
}

function switchTab(el, tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// Sidebar toggle
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  const collapsed = sidebar.classList.toggle('collapsed');
  btn.textContent = collapsed ? '▶' : '◀';
  btn.title = collapsed ? '展开侧边栏' : '收缩侧边栏';
}

// Update timestamp
document.getElementById('last-updated').textContent = new Date().toLocaleDateString('zh-CN');

// ── Boot ──
init().catch(console.error);
</script>
</body>
</html>
